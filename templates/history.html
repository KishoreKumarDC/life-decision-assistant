<!DOCTYPE html>
<html>
<head>
<title>History</title>

<style>

body{
background:transparent;
font-family: 'Plus Jakarta Sans', sans-serif;
color:white;
margin:0;
}

.history-box{
width:100%;
height:100vh;
overflow-y:auto;
padding:15px;
box-sizing:border-box;
background:rgba(0,0,0,0.6);
border-left:1px solid gold;
}

h3{
color:gold;
text-align:center;
margin-bottom:15px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:13px;
cursor:pointer;
}

li:hover{
background:rgba(212,175,55,0.1);
}

button{
width:100%;
margin-top:10px;
padding:10px;
background:linear-gradient(gold,#d4af37);
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="history-box">

<h3>🕘 Activity History</h3>

<ul id="historyList"></ul>

<button onclick="clearHistory()">Clear</button>

</div>

<script>

function loadHistory(){

fetch("/get_history")
.then(res=>res.json())
.then(data=>{

let list=document.getElementById("historyList")
list.innerHTML=""

data.reverse().forEach(item=>{

let li=document.createElement("li")

li.innerHTML = `
<b>${item.tool}</b><br>
${item.input}<br>
<small>${item.time}</small>
`

list.appendChild(li)

})
})

}

function clearHistory(){

fetch("/clear_history",{method:"POST"})
.then(()=>loadHistory())

}

loadHistory()

</script>

</body>
</html>
